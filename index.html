<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Timepiece</title>
    <meta name="description" content="A visually stunning, elegant digital clock.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="silk-background">
        <div class="drift spot-1"></div>
        <div class="drift spot-2"></div>
        <div class="drift spot-3"></div>
        <div class="drift spot-4"></div>
        <div class="drift spot-5"></div>
        <div class="drift spot-6"></div>
    </div>

    <div class="luxury-border-layer"></div>
    <div class="luxury-inner-border"></div>

    <main class="clock-display">
        <div class="greeting-layer">
            <h1 class="greeting" id="greeting">Good Evening</h1>
            <div class="pulse-dot"></div>
        </div>

        <div class="time-layer">
            <div class="time-wrapper">
                <span id="hours" class="time-segment">00</span>
                <span class="colon">:</span>
                <span id="minutes" class="time-segment">00</span>
                <span class="colon">:</span>
                <span id="seconds" class="time-segment">00</span>
            </div>
            <span class="am-pm" id="ampm">PM</span>
        </div>

        <div class="date-layer">
            <span class="date-display" id="date">Loading date...</span>
        </div>
    </main>

    <div class="hermes-signature" title="Merab Mamardashvili & Alexander Piatigorsky, 'Symbol and Consciousness'">
        Time is the primary language of being
    </div>

    <script src="script.js"></script>
</body>
</html>
